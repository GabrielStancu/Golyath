<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Squat rack left post -->
  <rect x="80" y="30" width="16" height="150" rx="4" fill="#1E1E1E" stroke="#2E2E2E" stroke-width="1.5"/>
  <!-- Squat rack right post -->
  <rect x="264" y="30" width="16" height="150" rx="4" fill="#1E1E1E" stroke="#2E2E2E" stroke-width="1.5"/>
  <!-- Left J-hook -->
  <rect x="96" y="78" width="18" height="8" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Right J-hook -->
  <rect x="246" y="78" width="18" height="8" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Barbell shaft -->
  <rect x="60" y="74" width="240" height="10" rx="5" fill="#F5C518"/>
  <!-- Left plates -->
  <rect x="55" y="64" width="14" height="30" rx="3" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="73" y="70" width="10" height="18" rx="2" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Right plates -->
  <rect x="291" y="64" width="14" height="30" rx="3" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="277" y="70" width="10" height="18" rx="2" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Squat depth indicator arrows -->
  <path d="M 170 100 L 170 155" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7" stroke-dasharray="5,4"/>
  <path d="M 190 100 L 190 155" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7" stroke-dasharray="5,4"/>
  <!-- Ground line -->
  <line x1="80" y1="180" x2="280" y2="180" stroke="#282828" stroke-width="2"/>
</svg>
