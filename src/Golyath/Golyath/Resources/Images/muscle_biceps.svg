<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Left dumbbell -->
  <rect x="55" y="95" width="80" height="8" rx="4" fill="#F5C518"/>
  <rect x="48" y="82" width="14" height="34" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="62" y="88" width="10" height="22" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="125" y="88" width="10" height="22" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="135" y="82" width="14" height="34" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Curl arc motion left -->
  <path d="M 95 99 Q 88 62 110 50" stroke="#F5C518" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5" stroke-dasharray="4,3"/>
  <!-- Right dumbbell -->
  <rect x="225" y="95" width="80" height="8" rx="4" fill="#F5C518"/>
  <rect x="218" y="82" width="14" height="34" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="232" y="88" width="10" height="22" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="295" y="88" width="10" height="22" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <rect x="305" y="82" width="14" height="34" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Curl arc motion right -->
  <path d="M 265 99 Q 272 62 250 50" stroke="#F5C518" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5" stroke-dasharray="4,3"/>
</svg>
