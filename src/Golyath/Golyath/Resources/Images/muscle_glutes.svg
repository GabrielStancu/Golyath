<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Bench platform -->
  <rect x="100" y="130" width="160" height="14" rx="6" fill="#1E1E1E" stroke="#2E2E2E" stroke-width="1.5"/>
  <!-- Bench legs -->
  <rect x="118" y="143" width="8" height="28" rx="2" fill="#1E1E1E"/>
  <rect x="234" y="143" width="8" height="28" rx="2" fill="#1E1E1E"/>
  <!-- Body silhouette in hip thrust -->
  <!-- Feet on ground -->
  <rect x="96" y="160" width="36" height="14" rx="4" fill="#2E2E2E"/>
  <!-- Legs -->
  <path d="M 114 161 L 120 130 L 140 130" stroke="#282828" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hips (raised amber) -->
  <ellipse cx="180" cy="118" rx="28" ry="18" fill="#F5C518" opacity="0.8"/>
  <!-- Upper body angled back -->
  <path d="M 207 122 Q 230 125 250 140" stroke="#282828" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Bar across hips -->
  <rect x="140" y="114" width="80" height="8" rx="4" fill="#D4A600"/>
  <!-- Motion up arrow -->
  <path d="M 180 108 L 180 90" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 174 96 L 180 90 L 186 96" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
