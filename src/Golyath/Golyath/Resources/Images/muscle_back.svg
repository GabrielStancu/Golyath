<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Pull-up bar -->
  <rect x="80" y="40" width="200" height="10" rx="5" fill="#F5C518"/>
  <!-- Left vertical support -->
  <rect x="80" y="40" width="10" height="140" rx="4" fill="#282828"/>
  <!-- Right vertical support -->
  <rect x="270" y="40" width="10" height="140" rx="4" fill="#282828"/>
  <!-- Left cable/rope -->
  <line x1="130" y1="50" x2="145" y2="100" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
  <!-- Right cable/rope -->
  <line x1="230" y1="50" x2="215" y2="100" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle bar (lat bar) -->
  <rect x="132" y="96" width="96" height="8" rx="4" fill="#D4A600"/>
  <!-- Left lat curve hint -->
  <path d="M 110 95 Q 100 130 140 155" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Right lat curve hint -->
  <path d="M 250 95 Q 260 130 220 155" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Weight stack -->
  <rect x="153" y="108" width="54" height="14" rx="3" fill="#1E1E1E" stroke="#2E2E2E" stroke-width="1"/>
  <rect x="158" y="122" width="44" height="10" rx="2" fill="#282828"/>
</svg>
