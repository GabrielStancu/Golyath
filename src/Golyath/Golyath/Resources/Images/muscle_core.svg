<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Plank body (horizontal line representing the body) -->
  <rect x="70" y="100" width="220" height="14" rx="7" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="78" cy="97" r="14" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Left forearm on ground -->
  <rect x="100" y="114" width="14" height="38" rx="5" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Right forearm on ground -->
  <rect x="200" y="114" width="14" height="38" rx="5" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Feet on ground -->
  <rect x="268" y="113" width="24" height="14" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Ground shadow line -->
  <line x1="60" y1="152" x2="300" y2="152" stroke="#1E1E1E" stroke-width="2"/>
  <!-- Core highlight -->
  <rect x="148" y="100" width="64" height="14" rx="7" fill="#F5C518" opacity="0.3"/>
  <!-- Core icon (lightning bolt for energy/power) -->
  <path d="M 178 86 L 170 100 L 177 100 L 169 114 L 182 100 L 175 100 Z" fill="#F5C518"/>
</svg>
