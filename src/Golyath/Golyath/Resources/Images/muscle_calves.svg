<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Step platform -->
  <rect x="100" y="148" width="160" height="16" rx="5" fill="#1E1E1E" stroke="#2E2E2E" stroke-width="1.5"/>
  <!-- Left leg (lower) -->
  <rect x="145" y="110" width="22" height="40" rx="6" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Left foot on platform -->
  <rect x="138" y="148" width="36" height="12" rx="4" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1"/>
  <!-- Right leg (raised - on toes) -->
  <rect x="193" y="90" width="22" height="60" rx="6" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Right foot - tip toes -->
  <rect x="200" y="148" width="22" height="8" rx="3" fill="#F5C518"/>
  <!-- Motion arrow up from right leg -->
  <path d="M 204 90 L 204 70" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 198 76 L 204 70 L 210 76" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dumbbell in hands (optional) -->
  <rect x="145" y="84" width="70" height="7" rx="3.5" fill="#D4A600" opacity="0.6"/>
  <rect x="136" y="80" width="12" height="15" rx="3" fill="#282828" stroke="#3A3A3A" stroke-width="1"/>
  <rect x="222" y="80" width="12" height="15" rx="3" fill="#282828" stroke="#3A3A3A" stroke-width="1"/>
</svg>
