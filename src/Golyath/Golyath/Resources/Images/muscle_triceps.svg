<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Rope cable attachment top -->
  <circle cx="180" cy="44" r="8" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="2"/>
  <!-- Cable lines -->
  <line x1="176" y1="52" x2="164" y2="90" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="184" y1="52" x2="196" y2="90" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle -->
  <rect x="152" y="87" width="56" height="10" rx="5" fill="#D4A600"/>
  <!-- Pushdown ropes extending down and angled outward -->
  <line x1="160" y1="97" x2="140" y2="148" stroke="#F5C518" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="97" x2="220" y2="148" stroke="#F5C518" stroke-width="3" stroke-linecap="round"/>
  <!-- End grips -->
  <circle cx="140" cy="150" r="6" fill="#F5C518"/>
  <circle cx="220" cy="150" r="6" fill="#F5C518"/>
  <!-- Motion arrows -->
  <path d="M 138 130 L 136 148" stroke="#F5C518" stroke-width="2" stroke-linecap="round" opacity="0.4" stroke-dasharray="3,3"/>
  <path d="M 222 130 L 224 148" stroke="#F5C518" stroke-width="2" stroke-linecap="round" opacity="0.4" stroke-dasharray="3,3"/>
</svg>
