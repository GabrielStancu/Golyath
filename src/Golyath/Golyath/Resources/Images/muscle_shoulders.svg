<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#141414"/>
  <!-- Barbell shaft -->
  <rect x="60" y="78" width="240" height="10" rx="5" fill="#F5C518"/>
  <!-- Left collar -->
  <rect x="96" y="70" width="18" height="26" rx="4" fill="#D4A600"/>
  <!-- Right collar -->
  <rect x="246" y="70" width="18" height="26" rx="4" fill="#D4A600"/>
  <!-- Left plates outer -->
  <rect x="54" y="62" width="16" height="42" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Left plates inner -->
  <rect x="74" y="68" width="20" height="30" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Right plates inner -->
  <rect x="266" y="68" width="20" height="30" rx="3" fill="#2E2E2E" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Right plates outer -->
  <rect x="290" y="62" width="16" height="42" rx="4" fill="#282828" stroke="#3A3A3A" stroke-width="1.5"/>
  <!-- Arms hinting upward press motion -->
  <path d="M 155 88 L 155 150 Q 155 165 170 165 L 190 165 Q 205 165 205 150 L 205 88" stroke="#3A3A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Arrow up -->
  <path d="M 175 138 L 180 120 L 185 138" stroke="#F5C518" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
